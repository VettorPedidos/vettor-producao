<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - VETTOR</title>

<style>
body {
    background: #111;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #fff;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: #00A859;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.link {
    margin-top: 10px;
    display: block;
    cursor: pointer;
    color: blue;
}
</style>
</head>

<body>

<div class="box">
    <h2>LOGIN</h2>

    <!-- AGORA É USUÁRIO E NÃO EMAIL -->
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">ENTRAR</button>

    <span class="link" onclick="esqueciSenha()">Esqueci minha senha</span>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyC0YaL9Fb9Z7gmUvvCP9KekLyBpTmaAHhQ",
  authDomain: "vettor-app.firebaseapp.com",
  projectId: "vettor-app",
  storageBucket: "vettor-app.firebasestorage.app",
  messagingSenderId: "833679689475",
  appId: "1:833679689475:web:b7ceb62ce14ab9b9b28b36"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


window.login = async function () {
    const usuario = document.getElementById("usuario").value.trim().toUpperCase();
    const senha = document.getElementById("senha").value;

    if (!usuario || !senha) {
        alert("Preencha usuário e senha");
        return;
    }

    try {
        // ADMIN DIRETO
        if (usuario === "ADMIN") {
            await signInWithEmailAndPassword(
                auth,
                "admin@vettor.com",
                senha
            );

            window.location.href = "admin.html";
            return;
        }

        // PROCURA USUÁRIO NO FIRESTORE
        const q = query(
            collection(db, "usuarios"),
            where("usuario", "==", usuario)
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
            alert("Usuário não encontrado");
            return;
        }

        const dadosUsuario = querySnapshot.docs[0].data();
        const email = dadosUsuario.email;

        // LOGIN COM EMAIL REAL + SENHA
        await signInWithEmailAndPassword(auth, email, senha);

        // SALVA DADOS PARA USAR NO FORMULÁRIO
        localStorage.setItem("usuarioNome", dadosUsuario.nome || "");
        localStorage.setItem("usuarioCodigo", dadosUsuario.codigo || "");
        localStorage.setItem("sequenciaAtual", dadosUsuario.sequencia || "0001");

        window.location.href = "formulario.html";

    } catch (error) {
        console.log(error);
        alert("Erro no login");
    }
};


window.esqueciSenha = async function () {
    const usuario = document.getElementById("usuario")
    .value
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "");

    if (!usuario) {
        alert("Digite seu usuário primeiro");
        return;
    }

    try {
        // ADMIN
        if (usuario === "ADMIN") {
            await sendPasswordResetEmail(auth, "admin@vettor.com");
            alert("Email de recuperação enviado");
            return;
        }

        // PROCURA EMAIL PELO USUÁRIO
        const q = query(
            collection(db, "usuarios"),
            where("usuario", "==", usuario)
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
            alert("Usuário não encontrado");
            return;
        }

        const dadosUsuario = querySnapshot.docs[0].data();

        await sendPasswordResetEmail(auth, dadosUsuario.email);

        alert("Email de recuperação enviado");

    } catch (error) {
        console.log(error);
        alert("Erro ao enviar email");
    }
};

</script>

</body>
</html>
