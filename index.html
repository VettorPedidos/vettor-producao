<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VETTOR</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1118, #111827, #0f172a);
      padding: 24px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 430px;
    }

    .login-card {
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand h1 {
      font-size: 28px;
      color: #0f172a;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .brand p {
      color: #64748b;
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid #dbe2ea;
      border-radius: 14px;
      font-size: 15px;
      background: #f8fafc;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #00A859;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(0,168,89,0.08);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #00A859;
      color: white;
      transition: 0.2s;
      margin-top: 6px;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .forgot {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #475569;
      cursor: pointer;
      font-weight: 600;
    }

    .forgot:hover {
      color: #00A859;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 520px) {
      .login-card {
        padding: 28px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <h1>VETTOR</h1>
        <p>Acesse seu sistema de produção</p>
      </div>

      <div class="field">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" />
      </div>

      <button onclick="login()">ENTRAR NO SISTEMA</button>

      <div class="forgot" onclick="esqueciSenha()">
        Esqueci minha senha
      </div>
    </div>

    <div class="footer">
      Painel VETTOR SPORTS
    </div>
  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyC0YaL9Fb9Z7gmUvvCP9KekLyBpTmaAHhQ",
  authDomain: "vettor-app.firebaseapp.com",
  projectId: "vettor-app",
  storageBucket: "vettor-app.firebasestorage.app",
  messagingSenderId: "833679689475",
  appId: "1:833679689475:web:b7ceb62ce14ab9b9b28b36"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


window.login = async function () {
    const usuario = document.getElementById("usuario").value.trim().toUpperCase();
    const senha = document.getElementById("senha").value;

    if (!usuario || !senha) {
        alert("Preencha usuário e senha");
        return;
    }

    try {
        // ADMIN DIRETO
        if (usuario === "ADMIN") {
            await signInWithEmailAndPassword(
                auth,
                "vtrsportsdados@gmail.com",
                senha
            );

            window.location.href = "admin.html";
            return;
        }

        // PROCURA USUÁRIO NO FIRESTORE
        const q = query(
            collection(db, "usuarios"),
            where("usuario", "==", usuario)
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
            alert("Usuário não encontrado");
            return;
        }

        const dadosUsuario = querySnapshot.docs[0].data();
        const email = dadosUsuario.email;

        // LOGIN COM EMAIL REAL + SENHA
        await signInWithEmailAndPassword(auth, email, senha);

        // VERIFICA SE É PRIMEIRO ACESSO
       if (dadosUsuario.senhaProvisoria === true) {
       alert("Primeiro acesso detectado. Você precisa trocar sua senha.");
       window.location.href = "trocar-senha.html";
       return;
       }

        // SALVA DADOS PARA USAR NO FORMULÁRIO
        localStorage.setItem("uid", querySnapshot.docs[0].id);
        localStorage.setItem("usuarioNome", dadosUsuario.nome || "");
        localStorage.setItem("usuarioCodigo", dadosUsuario.codigo || "");
        localStorage.setItem("sequenciaAtual", dadosUsuario.sequencia || "0001");

        window.location.href = "formulario.html";

    } catch (error) {
        console.log(error);
        alert("Erro no login");
    }
};


window.esqueciSenha = async function () {
    const usuario = document.getElementById("usuario")
    .value
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "");

    if (!usuario) {
        alert("Digite seu usuário primeiro");
        return;
    }

    try {
        // ADMIN
        if (usuario === "ADMIN") {
            await sendPasswordResetEmail(auth, "vtrsportsdados@gmail.com");
            alert("Email de recuperação enviado");
            return;
        }

        // PROCURA EMAIL PELO USUÁRIO
        const q = query(
            collection(db, "usuarios"),
            where("usuario", "==", usuario)
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
            alert("Usuário não encontrado");
            return;
        }

        const dadosUsuario = querySnapshot.docs[0].data();

        await sendPasswordResetEmail(auth, dadosUsuario.email);

        alert("Email de recuperação enviado");

    } catch (error) {
        console.log(error);
        alert("Erro ao enviar email");
    }
};

</script>

</body>
</html>
