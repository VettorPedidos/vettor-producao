<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - VETTOR</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 30px;
}

.box {
    background: white;
    padding: 25px;
    max-width: 700px;
    margin: auto;
    border-radius: 10px;
}

h2 {
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    padding: 12px;
    width: 100%;
    border: none;
    background: #00A859;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.logout {
    background: #d9534f;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">
    <h2>PAINEL ADMIN</h2>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="vendedor" placeholder="Nome vendedor (ex: GABY)">
    <input type="text" id="codigo" placeholder="Código vendedor (ex: V001)">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha provisória">

    <input type="text" id="pedidoInicial" placeholder="Número inicial pedido (ex: 0001)">

    <select id="tipo">
        <option value="vendedor">VENDEDOR</option>
        <option value="admin">ADMIN</option>
    </select>

    <select id="status">
        <option value="ativo">ATIVO</option>
        <option value="inativo">INATIVO</option>
    </select>

    <button onclick="cadastrarUsuario()">CADASTRAR USUÁRIO</button>

    <button class="logout" onclick="logout()">SAIR</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE_BUCKET",
  messagingSenderId: "SEU_MESSAGING_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.cadastrarUsuario = async function () {

    const nome = document.getElementById("nome").value;
    const vendedor = document.getElementById("vendedor").value;
    const codigo = document.getElementById("codigo").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const pedidoInicial = document.getElementById("pedidoInicial").value;
    const tipo = document.getElementById("tipo").value;
    const status = document.getElementById("status").value;

    if (!nome || !vendedor || !codigo || !email || !senha || !pedidoInicial) {
        alert("Preencha todos os campos");
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
        const uid = userCredential.user.uid;

        await setDoc(doc(db, "usuarios", uid), {
            nome,
            vendedor,
            codigo,
            email,
            pedidoAtual: pedidoInicial,
            tipo,
            status,
            senhaProvisoria: true,
            criadoEm: new Date()
        });

        alert("Usuário cadastrado com sucesso");

        document.querySelectorAll("input").forEach(input => input.value = "");

    } catch (error) {
        console.log(error);
        alert("Erro ao cadastrar usuário");
    }
};

window.logout = function () {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
};

</script>

</body>
</html>
