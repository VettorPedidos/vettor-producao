<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin Profissional - VETTOR</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #eef2f7;
    display: flex;
}

.sidebar {
    width: 240px;
    min-height: 100vh;
    background: #071a35;
    color: white;
    padding: 30px 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.menu-item {
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.main {
    flex: 1;
    padding: 30px;
}

.topbar {
    background: white;
    padding: 20px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.logout {
    background: #e53935;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.panel {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h2, h3 {
    margin-bottom: 18px;
    color: #071a35;
}

input, select {
    width: 100%;
    padding: 14px;
    border: 1px solid #dcdcdc;
    border-radius: 10px;
    margin-bottom: 12px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn-green {
    background: #16a34a;
}

.btn-blue {
    background: #0284c7;
}

.card-usuario {
    border: 1px solid #ddd;
    background: #fafafa;
    padding: 15px;
    border-radius: 12px;
    margin-top: 12px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>VETTOR ADMIN</h2>
    <div class="menu-item">Dashboard</div>
    <div class="menu-item">Usuários</div>
    <div class="menu-item">Pedidos</div>
    <div class="menu-item">Relatórios</div>
    <div class="menu-item">Configurações</div>
</div>

<div class="main">

    <div class="topbar">
        <div>
            <h2>Painel Administrativo</h2>
            <p>Gestão de usuários</p>
        </div>
        <button class="logout" onclick="logout()">SAIR</button>
    </div>

    <div class="panel">

        <h3>Cadastrar Usuário</h3>

        <input type="text" id="nome" placeholder="Nome completo">
        <input type="text" id="usuario" placeholder="Usuário login">
        <input type="text" id="codigo" placeholder="Código vendedor">
        <input type="email" id="email" placeholder="Email recuperação">
        <input type="password" id="senha" placeholder="Senha provisória">
        <input type="text" id="sequencia" placeholder="Número inicial pedido (ex: 0084)">

        <select id="tipo">
            <option value="vendedor">VENDEDOR</option>
            <option value="admin">ADMIN</option>
        </select>

        <select id="status">
            <option value="ativo">ATIVO</option>
            <option value="inativo">INATIVO</option>
        </select>

        <button class="btn-green" onclick="cadastrarUsuario()">
            CADASTRAR USUÁRIO
        </button>

        <br><br>

        <h3>Buscar Usuário</h3>

        <input
            type="text"
            id="buscarUsuario"
            placeholder="Digite nome do usuário"
        >

        <button class="btn-blue" onclick="buscarUsuario()">
            BUSCAR USUÁRIO
        </button>

        <div id="resultadoUsuario"></div>

    </div>

</div>

</body>
</html>
