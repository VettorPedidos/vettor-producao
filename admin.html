<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin Profissional</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #eef2f7;
  display: flex;
}

.sidebar {
  width: 250px;
  min-height: 100vh;
  background: #0b1f3a;
  color: white;
  padding: 30px 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
  font-size: 22px;
}

.menu-item {
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
}

.menu-item:hover {
  background: rgba(255,255,255,0.08);
}

.main {
  flex: 1;
  padding: 30px;
}

.topbar {
  background: white;
  padding: 20px 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.topbar h1 {
  font-size: 24px;
  color: #0b1f3a;
}

.logout {
  background: #e53935;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 25px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.card h3 {
  font-size: 15px;
  color: #666;
  margin-bottom: 10px;
}

.card strong {
  font-size: 28px;
  color: #0b1f3a;
}

.content {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.panel {
  background: white;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.panel h2 {
  margin-bottom: 20px;
  color: #0b1f3a;
}

input, select {
  width: 100%;
  padding: 14px;
  border: 1px solid #dfe4ea;
  border-radius: 10px;
  margin-bottom: 14px;
}

button.primary {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button.search {
  width: 100%;
  padding: 14px;
  background: #0284c7;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>VETTOR ADMIN</h2>

  <div class="menu-item">Dashboard</div>
  <div class="menu-item">Usuários</div>
  <div class="menu-item">Pedidos</div>
  <div class="menu-item">Relatórios</div>
  <div class="menu-item">Configurações</div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Painel Administrativo</h1>
    <button class="logout">SAIR</button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Usuários Ativos</h3>
      <strong>24</strong>
    </div>

    <div class="card">
      <h3>Administradores</h3>
      <strong>3</strong>
    </div>

    <div class="card">
      <h3>Vendedores</h3>
      <strong>21</strong>
    </div>
  </div>

  <div class="content">
    <div class="panel">
      <h2>Cadastrar Usuário</h2>

      <input type="text" placeholder="Nome completo">
      <input type="text" placeholder="Usuário login">
      <input type="text" placeholder="Código vendedor">
      <input type="email" placeholder="Email recuperação">
      <input type="password" placeholder="Senha provisória">
      <input type="text" placeholder="Sequência inicial pedido">

      <select>
        <option>VENDEDOR</option>
        <option>ADMIN</option>
      </select>

      <select>
        <option>ATIVO</option>
        <option>INATIVO</option>
      </select>

      <button class="primary">CADASTRAR USUÁRIO</button>
    </div>

    <div class="panel">
      <h2>Buscar Usuário</h2>

      <input type="text" placeholder="Digite o nome do usuário">
      <button class="search">BUSCAR USUÁRIO</button>
    </div>
  </div>
</div>

</body>
</html>
