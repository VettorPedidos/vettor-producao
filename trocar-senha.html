<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trocar Senha - VETTOR</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #fff;
    width: 380px;
    padding: 35px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

h2 {
    margin-bottom: 10px;
}

p {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    box-sizing: border-box;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    background: #00A859;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.95;
}
</style>
</head>

<body>

<div class="box">
    <h2>Primeiro Acesso</h2>
    <p>Defina sua nova senha para continuar</p>

    <input
        type="password"
        id="novaSenha"
        placeholder="Nova senha"
    >

    <input
        type="password"
        id="confirmarSenha"
        placeholder="Confirmar nova senha"
    >

    <button onclick="trocarSenha()">
        SALVAR NOVA SENHA
    </button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    updatePassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyC0YaL9Fb9Z7gmUvvCP9KekLyBpTmaAHhQ",
  authDomain: "vettor-app.firebaseapp.com",
  projectId: "vettor-app",
  storageBucket: "vettor-app.firebasestorage.app",
  messagingSenderId: "833679689475",
  appId: "1:833679689475:web:b7ceb62ce14ab9b9b28b36"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


window.trocarSenha = async function () {
    const novaSenha = document.getElementById("novaSenha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    if (!novaSenha || !confirmarSenha) {
        alert("Preencha todos os campos");
        return;
    }

    if (novaSenha.length < 6) {
        alert("A senha deve ter no mínimo 6 caracteres");
        return;
    }

    if (novaSenha !== confirmarSenha) {
        alert("As senhas não coincidem");
        return;
    }

    try {
        const user = auth.currentUser;

        if (!user) {
            alert("Usuário não autenticado. Faça login novamente.");
            window.location.href = "index.html";
            return;
        }

        await updatePassword(user, novaSenha);

        await updateDoc(doc(db, "usuarios", user.uid), {
            senhaProvisoria: false
        });

        alert("Senha alterada com sucesso");

        window.location.href = "formulario.html";

    } catch (error) {
        console.log(error);

        let msg = "Erro ao alterar senha";

        if (error.code === "auth/requires-recent-login") {
            msg = "Faça login novamente e tente outra vez.";
        }

        alert(msg);
    }
};

</script>

</body>
</html>
