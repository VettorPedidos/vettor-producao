!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trocar Senha - VETTOR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0b1118,#111827,#0f172a);
padding:24px;
}
.box{
background:rgba(255,255,255,.98);
width:100%;
max-width:430px;
padding:42px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
text-align:center;
}
h2{
font-size:28px;
color:#0f172a;
margin-bottom:10px;
}
p{
color:#64748b;
font-size:14px;
margin-bottom:28px;
}
input{
width:100%;
padding:15px 16px;
margin:10px 0;
border:1px solid #dbe2ea;
border-radius:14px;
font-size:15px;
background:#f8fafc;
}
input:focus{
outline:none;
border-color:#00A859;
background:#fff;
box-shadow:0 0 0 4px rgba(0,168,89,.08);
}
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#00A859;
color:#fff;
font-weight:700;
cursor:pointer;
margin-top:12px;
font-size:15px;
}
button:hover{opacity:.96}
</style>
</head>
<body>

<div class="box">
<h2>Primeiro Acesso</h2>
<p>Defina sua nova senha para continuar</p>

<input
type="password"
id="novaSenha"
placeholder="Nova senha"
>

<input
type="password"
id="confirmarSenha"
placeholder="Confirmar nova senha"
>

<button onclick="trocarSenha()">
SALVAR NOVA SENHA
</button>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    updatePassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyC0YaL9Fb9Z7gmUvvCP9KekLyBpTmaAHhQ",
  authDomain: "vettor-app.firebaseapp.com",
  projectId: "vettor-app",
  storageBucket: "vettor-app.firebasestorage.app",
  messagingSenderId: "833679689475",
  appId: "1:833679689475:web:b7ceb62ce14ab9b9b28b36"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


window.trocarSenha = async function () {
    const novaSenha = document.getElementById("novaSenha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    if (!novaSenha || !confirmarSenha) {
        alert("Preencha todos os campos");
        return;
    }

    if (novaSenha.length < 6) {
        alert("A senha deve ter no mínimo 6 caracteres");
        return;
    }

    if (novaSenha !== confirmarSenha) {
        alert("As senhas não coincidem");
        return;
    }

    try {
        const user = auth.currentUser;

        if (!user) {
            alert("Usuário não autenticado. Faça login novamente.");
            window.location.href = "index.html";
            return;
        }

        await updatePassword(user, novaSenha);

        await updateDoc(doc(db, "usuarios", user.uid), {
            senhaProvisoria: false
        });

        alert("Senha alterada com sucesso");

        window.location.href = "formulario.html";

    } catch (error) {
        console.log(error);

        let msg = "Erro ao alterar senha";

        if (error.code === "auth/requires-recent-login") {
            msg = "Faça login novamente e tente outra vez.";
        }

        alert(msg);
    }
};

</script>

</body>
</html>
